name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.adminCommand({ ping: 1 })' | mongosh --quiet"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 20s
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Run backend tests
        run: npx jest --runInBand
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://127.0.0.1:27017/Collab_Sync_DB
          REDIS_URL: redis://127.0.0.1:6379
          ELASTICSEARCH_NODE: http://127.0.0.1:9200
          JWT_SECRET: ci_jwt_secret
          SESSION_SECRET: ci_session_secret
          RAZORPAY_KEY_ID: rzp_test_mock
          RAZORPAY_KEY_SECRET: mock_secret
          RAZORPAY_WEBHOOK_SECRET: mock_webhook_secret
          CLOUDINARY_CLOUD_NAME: ci_cloud
          CLOUDINARY_API_KEY: ci_key
          CLOUDINARY_API_SECRET: ci_secret

  frontend-build:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:3000
          VITE_SOCKET_URL: http://localhost:3000

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  docker-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare compose env file
        run: cp .env.example .env

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build Docker images
        run: docker compose build backend frontend

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs:
      - docker-validation
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        shell: bash
        run: |
          IMAGE_REPO="$(echo "${REGISTRY}/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=${IMAGE_REPO}/backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${IMAGE_REPO}/frontend" >> "$GITHUB_ENV"

      - name: Publish backend image
        shell: bash
        run: |
          docker buildx build \
            --file Dockerfile \
            --tag "${BACKEND_IMAGE}:sha-${GITHUB_SHA}" \
            --tag "${BACKEND_IMAGE}:latest" \
            --push \
            .

      - name: Publish frontend image
        shell: bash
        run: |
          VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL }}"
          if [ -z "$VITE_API_BASE_URL" ]; then
            VITE_API_BASE_URL="http://localhost:3000"
          fi

          docker buildx build \
            --file frontend/Dockerfile \
            --build-arg "VITE_API_BASE_URL=${VITE_API_BASE_URL}" \
            --tag "${FRONTEND_IMAGE}:sha-${GITHUB_SHA}" \
            --tag "${FRONTEND_IMAGE}:latest" \
            --push \
            ./frontend
